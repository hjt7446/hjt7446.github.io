<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1"
  >

  <meta
    name="description"
    content="아이와 함께 볼 공연을 놓치지 않도록 공식 정보를 모아 보여주는 가족 공연 찾기"
  >

  <title>우리 가족 공연찾기</title>

  <link rel="stylesheet" href="styles.css">
</head>

<body>
  <header class="site-header">
    <a class="brand" href="#top">
      우리 가족 공연찾기
    </a>

    <nav>
      <a href="#watch">관심 작품</a>
      <a href="#family">아이와 함께</a>
      <a href="#all">전체 공연</a>
    </nav>
  </header>

  <main id="top">
    <section class="hero">
      <p class="eyebrow">
        좋은 공연, 이번에는 놓치지 않도록
      </p>

      <h1>
        아이와 볼 공연을<br>
        정확한 정보로 한눈에.
      </h1>

      <div id="dataStatus" class="data-status">
        데이터 확인 중…
      </div>

      <div class="filters">
        <input
          id="searchInput"
          type="search"
          placeholder="공연명, 장르, 공연장 검색"
        >

        <select id="regionFilter">
          <option value="">전체 지역</option>
        </select>

        <select id="ageFilter">
          <option value="">모든 연령</option>
          <option value="family">전체 관람가·8세 이하</option>
          <option value="verified">연령 확인됨</option>
        </select>

        <input
          id="dateFilter"
          type="date"
        >
      </div>
    </section>

    <section id="watch" class="section highlight">
      <div class="section-head">
        <div>
          <span>⭐</span>
          <h2>관심 작품</h2>
        </div>

        <p id="watchKeywords"></p>
      </div>

      <div
        id="watchList"
        class="card-grid"
      ></div>
    </section>

    <section id="family" class="section">
      <div class="section-head">
        <div>
          <span>👨‍👩‍👧‍👦</span>
          <h2>아이와 함께</h2>
        </div>

        <p>
          전체 관람가 또는 8세 이하로 표시된 가족·어린이 공연
        </p>
      </div>

      <div
        id="familyList"
        class="card-grid"
      ></div>
    </section>

    <section id="all" class="section">
      <div class="section-head">
        <div>
          <span>🎭</span>
          <h2 id="resultTitle">전체 공연</h2>
        </div>

        <p id="resultCount"></p>
      </div>

      <div
        id="allList"
        class="card-grid"
      ></div>
    </section>
  </main>

  <dialog id="detailDialog">
    <button
      class="dialog-close"
      type="button"
      aria-label="닫기"
    >
      ×
    </button>

    <div id="detailContent"></div>
  </dialog>

  <footer>
    <span id="footerMeta"></span>

    <br>

    정보는 예매 전 공식 예매처에서 최종 확인하세요.
  </footer>

  <script
    type="module"
    src="app.js"
  ></script>
</body>
</html>
