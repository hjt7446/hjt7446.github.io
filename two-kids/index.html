<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#2563eb">
  <title>둘 데리고 어디가</title>
  <link rel="stylesheet" href="./style.css">
  <script src="./app.js" defer></script>
</head>
<body>
  <header class="hero">
    <div class="wrap">
      <p class="eyebrow">맘맘 전국 인기 랭킹 자동수집</p>
      <h1>둘 데리고 어디가</h1>
      <p>맘맘 인기 랭킹을 무한 스크롤 끝까지 수집해 지역과 연령으로 찾아보세요.</p>
    </div>
  </header>

  <main class="wrap">
    <section class="panel filters" aria-label="장소 검색 조건">
      <label>지역
        <select id="region">
          <option value="all">전체</option>
        </select>
      </label>
      <label>세부 지역
        <select id="district">
          <option value="all">전체</option>
        </select>
      </label>
      <label>아이 나이
        <select id="age">
          <option value="all">상관없음</option>
          <option value="0">0세</option><option value="1">1세</option>
          <option value="2">2세</option><option value="3">3세</option>
          <option value="4">4세</option><option value="5">5세</option>
          <option value="6">6세</option><option value="7">7세</option>
          <option value="8">8세</option><option value="9">9세</option>
          <option value="10">10세</option><option value="11">11세</option>
          <option value="12">12세</option>
        </select>
      </label>
      <label>검색
        <input id="keyword" type="search" placeholder="시설명 또는 주소">
      </label>
      <button id="reset" type="button">초기화</button>
    </section>

    <section class="status" aria-live="polite">
      <div><strong id="count">0</strong>곳</div>
      <div id="updated">데이터 확인 중</div>
    </section>

    <section id="sourceStatus" class="sources" aria-label="수집 상태"></section>
    <section id="list" class="cards" aria-live="polite"></section>

    <section id="empty" class="empty" hidden>
      <h2>목록이 없습니다.</h2>
      <p>현재 수집된 장소가 없거나 선택한 조건에 맞는 장소가 없습니다.</p>
    </section>
  </main>

  <template id="cardTemplate">
    <article class="card">
      <div class="card-top">
        <span class="badge"></span>
        <span class="ages"></span>
      </div>
      <h2></h2>
      <p class="address"></p>
      <p class="description"></p>
      <div class="actions">
        <a class="official" target="_blank" rel="noopener">맘맘에서 보기</a>
        <a class="map" target="_blank" rel="noopener">지도 보기</a>
      </div>
    </article>
  </template>
</body>
</html>
