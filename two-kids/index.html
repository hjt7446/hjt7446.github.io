<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#fff7ed">
  <title>둘데리고 어디가</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <header class="hero">
    <div class="wrap">
      <p class="eyebrow">2022년생 + 2026년생 맞춤 나들이</p>
      <h1>둘데리고 어디가</h1>
      <p class="lead">첫째는 재미있고, 둘째는 편안하고, 보호자는 덜 힘든 장소를 골라드려요.</p>
      <div class="family-config" aria-label="아이 출생연도 설정">
        <label>첫째 출생연도 <input id="firstYear" type="number" min="2010" max="2030" value="2022"></label>
        <label>둘째 출생연도 <input id="secondYear" type="number" min="2010" max="2030" value="2026"></label>
        <button id="saveYears" class="secondary">저장</button>
      </div>
      <p id="ageSummary" class="age-summary"></p>
    </div>
  </header>

  <main class="wrap">
    <section class="panel filters" aria-labelledby="filterTitle">
      <div class="section-head">
        <div><p class="kicker">조건 고르기</p><h2 id="filterTitle">오늘 상황은 어때요?</h2></div>
        <button id="resetFilters" class="text-button">초기화</button>
      </div>
      <div class="filter-grid">
        <label><span>지역</span><select id="region"><option value="all">전체</option></select></label>
        <label><span>장소 유형</span><select id="category"><option value="all">전체</option><option value="kids-cafe">공공 키즈카페</option><option value="library">어린이도서관</option><option value="museum">박물관·체험관</option><option value="playground">실내놀이터</option></select></label>
        <label><span>보호자 수</span><select id="guardianMode"><option value="solo">보호자 1명</option><option value="two">보호자 2명 이상</option></select></label>
        <label><span>체류 시간</span><select id="duration"><option value="all">상관없음</option><option value="short">1시간 안팎</option><option value="half">2~4시간</option></select></label>
      </div>
      <div class="chips" id="featureFilters">
        <button data-feature="indoor">실내</button><button data-feature="stroller">유모차</button><button data-feature="nursingRoom">수유실</button><button data-feature="diaperTable">기저귀 교환대</button><button data-feature="parking">주차</button><button data-feature="elevator">엘리베이터</button><button data-feature="reservationFree">예약 없이</button><button data-feature="free">무료·저렴</button>
      </div>
    </section>

    <section class="recommendation panel" aria-labelledby="pickTitle">
      <div><p class="kicker">결정 피로 줄이기</p><h2 id="pickTitle">조건에 맞는 곳 하나 골라줘</h2><p id="pickHint">필터를 고른 뒤 버튼을 눌러보세요.</p></div>
      <button id="randomPick" class="primary">오늘 갈 곳 뽑기</button>
    </section>

    <section aria-labelledby="resultTitle">
      <div class="section-head results-head">
        <div><p class="kicker">추천 결과</p><h2 id="resultTitle"><span id="resultCount">0</span>곳을 찾았어요</h2></div>
        <label class="sort">정렬 <select id="sort"><option value="score">우리 가족 적합도순</option><option value="first">첫째 재미순</option><option value="baby">둘째 편의순</option><option value="solo">혼자 데려가기 쉬운순</option></select></label>
      </div>
      <div id="cards" class="cards"></div>
      <div id="empty" class="empty" hidden><strong>조건에 맞는 장소가 없어요.</strong><p>필터를 한두 개 풀어보세요.</p></div>
    </section>

    <section class="panel note">
      <h2>방문 전 확인</h2>
      <p>운영시간, 휴관일, 연령 제한, 예약 여부는 바뀔 수 있습니다. 카드의 공식 페이지에서 최신 정보를 다시 확인하세요.</p>
      <p class="updated">데이터 갱신: <span id="updatedAt">확인 중</span></p>
    </section>
  </main>

  <dialog id="pickDialog">
    <button id="closeDialog" class="dialog-close" aria-label="닫기">×</button>
    <p class="kicker">오늘의 추천</p>
    <div id="pickContent"></div>
  </dialog>

  <template id="cardTemplate">
    <article class="card">
      <div class="card-top"><div><span class="category-badge"></span><h3></h3><p class="address"></p></div><button class="favorite" aria-label="즐겨찾기">♡</button></div>
      <div class="score-row"><div class="total-score"><strong></strong><span>우리 가족 적합도</span></div><div class="mini-scores"></div></div>
      <p class="reason"></p><div class="tags"></div>
      <div class="card-actions"><a class="official" target="_blank" rel="noopener noreferrer">공식 정보</a><a class="map" target="_blank" rel="noopener noreferrer">지도 보기</a></div>
    </article>
  </template>
  <script src="./app.js"></script>
</body>
</html>
