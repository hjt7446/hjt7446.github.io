name: Update family performance data

on:
  workflow_dispatch:

  schedule:
    # KST 07:10, 13:10, 19:10
    - cron: "10 22,4,10 * * *"

permissions:
  contents: write

concurrency:
  group: family-performance-sync
  cancel-in-progress: true

jobs:
  sync:
    runs-on: ubuntu-latest

    # 기존 30분에서 120분으로 증가
    timeout-minutes: 120

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.repository.default_branch }}
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Validate configuration
        run: python -m json.tool family/config.json >/dev/null

      - name: Sync official performance data
        env:
          KOPIS_API_KEY: ${{ secrets.KOPIS_API_KEY }}
          SYNC_DAYS_BACK: "14"
          SYNC_DAYS_FORWARD: "90"
          SYNC_PAGE_SIZE: "100"
          SYNC_MAX_PAGES: "20"
          SYNC_REQUEST_DELAY: "0.05"
          SYNC_TIMEOUT: "15"
          MIN_SUCCESS_RATIO: "0.80"
        run: python -u family/scripts/sync_performances.py

      - name: Validate generated JSON
        run: |
          python -m json.tool family/data/performances.json >/dev/null
          python -m json.tool family/data/venues.json >/dev/null
          python -m json.tool family/data/sync-meta.json >/dev/null
          python -m json.tool family/data/alerts.json >/dev/null

      - name: Commit verified changes
        run: |
          if git diff --quiet -- family/data; then
            echo "No verified data changes"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add family/data
          git commit -m "data: refresh verified family performances"

          # 실행 중 다른 변경이 올라온 경우 충돌 방지
          git pull --rebase origin "${{ github.event.repository.default_branch }}"
          git push origin "HEAD:${{ github.event.repository.default_branch }}"

      - name: Notify sync failure
        if: failure()
        env:
          WEBHOOK: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          if [ -n "$WEBHOOK" ]; then
            curl -fsS \
              -H "Content-Type: application/json" \
              -d '{"content":"⚠️ 가족 공연 데이터 갱신에 실패했습니다. GitHub Actions를 확인하세요."}' \
              "$WEBHOOK"
          fi
