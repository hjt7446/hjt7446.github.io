name: Update two-kids places

on:
  workflow_dispatch:
  schedule:
    # 매일 한국시간 오전 5시 20분 (UTC 전날 20:20)
    - cron: "20 20 * * *"

permissions:
  contents: write

concurrency:
  group: update-two-kids-places
  cancel-in-progress: false

jobs:
  crawl:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4

      - name: Crawl places
        run: python two-kids/scripts/crawl_places.py

      - name: Validate generated JSON
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          path = Path("two-kids/data/places.json")
          data = json.loads(path.read_text(encoding="utf-8"))

          if not isinstance(data, dict):
              raise SystemExit("places.json root must be an object")
          if not isinstance(data.get("places"), list):
              raise SystemExit("places must be an array")

          print(f"Valid JSON: {len(data['places'])} places")
          PY

      - name: Commit updated places
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add two-kids/data/places.json

          if git diff --cached --quiet; then
            echo "변경된 데이터가 없습니다."
            exit 0
          fi

          git commit -m "자동 업데이트: 아이와 갈 곳 데이터"
          git push
