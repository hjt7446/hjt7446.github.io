name: Update two-kids places

on:
  workflow_dispatch:
  schedule:
    - cron: "20 20 * * *"

permissions:
  contents: write

concurrency:
  group: update-two-kids-places
  cancel-in-progress: false

jobs:
  crawl:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install packages
        run: python -m pip install requests beautifulsoup4

      - name: Crawl Seoul, Gyeonggi and Incheon
        run: python two-kids/scripts/crawl_places.py

      - name: Validate JSON
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          path = Path("two-kids/data/places.json")
          data = json.loads(path.read_text(encoding="utf-8"))
          assert isinstance(data.get("places"), list)
          assert isinstance(data.get("sources"), list)
          print(f"places={len(data['places'])}, sources={len(data['sources'])}")
          PY

      - name: Commit result
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add two-kids/data/places.json
          if git diff --cached --quiet; then
            echo "No changes"
            exit 0
          fi
          git commit -m "자동 업데이트: 서울 경기 인천 아이 장소"
          git push
