name: Update two-kids from Mom-mom all rankings

on:
  workflow_dispatch:
  schedule:
    # 매일 한국시간 오전 5시 20분
    - cron: "20 20 * * *"

permissions:
  contents: write

concurrency:
  group: update-two-kids-mommom-all
  cancel-in-progress: false

jobs:
  crawl:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install crawler
        run: |
          python -m pip install --upgrade pip
          pip install playwright
          python -m playwright install --with-deps chromium

      - name: Crawl all Mom-mom rankings
        run: python two-kids/scripts/crawl_places.py

      - name: Validate result
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          path = Path("two-kids/data/places.json")
          data = json.loads(path.read_text(encoding="utf-8"))
          places = data.get("places")
          assert isinstance(places, list), "places must be a list"
          assert places, "crawler returned zero places"
          assert all(item.get("region") for item in places), "missing region"
          assert all(item.get("district") for item in places), "missing district"
          print("places=", len(places))
          print("regions=", data.get("regionCounts", {}))
          PY

      - name: Commit result
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add two-kids/data/places.json

          if git diff --cached --quiet; then
            echo "No changes"
            exit 0
          fi

          git commit -m "자동 업데이트: 맘맘 전국 인기 장소"
          git push
